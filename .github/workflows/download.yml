name: Video Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Video URL to download'
        required: true
      format:
        description: 'Download format'
        required: false
        default: 'best_video'
        type: choice
        options:
          - best_video
          - mp4_1080
          - mp4_720
          - mp3_audio
      task_id:
        description: 'Task ID (auto-generated if empty)'
        required: false
        default: ''

  repository_dispatch:
    types: [download_video]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js (required by yt-dlp for YouTube)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Deno (JS runtime required by yt-dlp for YouTube n-param)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Chrome (for Selenium/Douyin)
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install -U yt-dlp requests selenium bgutil-ytdlp-pot-provider google-api-python-client google-auth

      - name: Start PO Token server (bypasses YouTube bot detection)
        run: |
          echo "=== Setting up bgutil-pot PO Token server (Node.js) ==="
          git clone --single-branch --branch 1.3.1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /tmp/bgutil-pot
          cd /tmp/bgutil-pot/server/
          npm ci
          npx tsc
          node build/main.js &
          sleep 5
          echo "PO Token server started on port 4416 (v1.3.1)"
          # Verify server is running
          curl -sf http://127.0.0.1:4416/ && echo "Server OK" || echo "Server started (no health endpoint)"

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "VIDEO_URL=${{ github.event.client_payload.video_url }}" >> $GITHUB_OUTPUT
            echo "FORMAT=${{ github.event.client_payload.format || 'best_video' }}" >> $GITHUB_OUTPUT
            echo "TASK_ID=${{ github.event.client_payload.task_id || '' }}" >> $GITHUB_OUTPUT
            echo "CALLBACK_URL=${{ github.event.client_payload.callback_url || '' }}" >> $GITHUB_OUTPUT
          else
            echo "VIDEO_URL=${{ github.event.inputs.video_url }}" >> $GITHUB_OUTPUT
            echo "FORMAT=${{ github.event.inputs.format }}" >> $GITHUB_OUTPUT
            echo "TASK_ID=${{ github.event.inputs.task_id || '' }}" >> $GITHUB_OUTPUT
            echo "CALLBACK_URL=" >> $GITHUB_OUTPUT
          fi


      - name: Verify JS runtime and download EJS solver
        run: |
          echo "Deno: $(which deno) -> $(deno --version | head -1)"
          echo "Node.js: $(which node) -> $(node --version)"
          echo "=== Pre-downloading EJS challenge solver scripts ==="
          yt-dlp --remote-components ejs:github --skip-download "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 2>&1 || true
          echo "=== EJS solver ready ==="

      - name: Download Video
        id: download
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          TASK_ARGS=""
          if [ -n "${{ steps.vars.outputs.TASK_ID }}" ]; then
            TASK_ARGS="--task-id ${{ steps.vars.outputs.TASK_ID }}"
          fi
          python action_download.py \
            --url "${{ steps.vars.outputs.VIDEO_URL }}" \
            --format "${{ steps.vars.outputs.FORMAT }}" \
            $TASK_ARGS

      - name: List downloaded files
        if: always()
        run: |
          echo "=== Downloaded files ==="
          find downloads/ -type f ! -name "results.json" -exec ls -lh {} \; 2>/dev/null || echo "No files"

      - name: Upload as Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video-${{ steps.download.outputs.task_id || github.run_id }}
          path: |
            downloads/
            !downloads/**/results.json
          retention-days: 1

      - name: Upload results summary
        if: success()
        run: |
          TASK_ID="${{ steps.download.outputs.task_id }}"
          echo "=== Upload Results ==="
          if [ -f "downloads/${TASK_ID}/results.json" ]; then
            python -c "
import json
with open('downloads/${TASK_ID}/results.json') as f:
    data = json.load(f)
uploads = data.get('uploads', {})
tg = uploads.get('telegram', [])
gd = uploads.get('gdrive', [])
print(f'Telegram: {len(tg)} files uploaded')
for t in tg: print(f'  ✅ {t[\"filename\"]}')
print(f'Google Drive: {len(gd)} files uploaded')
for g in gd: print(f'  ✅ {g[\"filename\"]} -> {g[\"link\"]}')
if not tg and not gd: print('⚠️ No cloud uploads (check secrets)')
"
          fi

      - name: Callback to web
        if: always() && steps.vars.outputs.CALLBACK_URL != ''
        run: |
          STATUS="${{ job.status }}"
          TASK_ID="${{ steps.download.outputs.task_id || steps.vars.outputs.TASK_ID }}"
          RUN_ID="${{ github.run_id }}"
          FILES=$(find downloads/ -type f ! -name "results.json" -printf '%f|%s\n' 2>/dev/null | head -20)
          GDRIVE_LINKS="${{ steps.download.outputs.gdrive_links || '' }}"
          TELEGRAM_OK="${{ steps.download.outputs.telegram_uploaded || 'false' }}"
          curl -s -X POST "${{ steps.vars.outputs.CALLBACK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Action-Secret: ${{ secrets.ACTION_SECRET }}" \
            -d "{\"task_id\":\"${TASK_ID}\",\"run_id\":\"${RUN_ID}\",\"status\":\"${STATUS}\",\"files\":\"${FILES}\",\"gdrive_links\":\"${GDRIVE_LINKS}\",\"telegram\":\"${TELEGRAM_OK}\"}" || true
